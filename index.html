<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0211;
            --panel-bg: #1a0525;
            --text-color: #00f2ff;
            --accent-color: #ff00ff;
            --booked-color: #00ff41;
            --hint-color: #441a52;
        }
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
            text-shadow: 0 0 5px var(--text-color);
        }
        .calendar-header { 
            display: flex; justify-content: space-between; width: 100%; max-width: 320px; 
            align-items: center; margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .calendar-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; 
            width: 100%; max-width: 320px; text-align: center;
        }
        .weekday { color: var(--accent-color); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .day { 
            padding: 12px 0; border: 1px solid var(--hint-color); 
            cursor: pointer; transition: 0.3s; position: relative;
            background: var(--panel-bg);
        }
        .day:hover { box-shadow: 0 0 15px var(--text-color); z-index: 10; }
        .day.selected { 
            background: var(--accent-color) !important; 
            color: white !important; 
            box-shadow: 0 0 20px var(--accent-color);
        }
        .day.booked { 
            border: 1px solid var(--booked-color);
            color: var(--booked-color);
            box-shadow: inset 0 0 5px var(--booked-color);
        }
        .day.booked::after {
            content: 'ID'; position: absolute; bottom: 2px; right: 2px; font-size: 8px;
        }
        .day.other-month { opacity: 0.2; cursor: default; }
        
        #confirm-btn { 
            background: transparent; color: var(--text-color); 
            border: 2px solid var(--text-color); padding: 15px 30px; 
            margin-top: 25px; width: 100%; max-width: 320px;
            font-weight: bold; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 10px var(--text-color);
            transition: 0.3s;
        }
        #confirm-btn:active { transform: scale(0.95); box-shadow: 0 0 20px var(--accent-color); border-color: var(--accent-color); color: var(--accent-color); }
    </style>
</head>
<body>

<div class="calendar-header">
    <strong id="month-year">MARCH // 2026</strong>
    <span style="color: var(--accent-color); font-size: 10px;">SYSTEM_ACTIVE</span>
</div>

<div class="calendar-grid" id="calendar-grid">
    <div class="weekday">mon</div><div class="weekday">tue</div><div class="weekday">wed</div>
    <div class="weekday">thu</div><div class="weekday">fri</div><div class="weekday">sat</div><div class="weekday">sun</div>
</div>

<button id="confirm-btn">EXECUTE CHANGES</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    const grid = document.getElementById('calendar-grid');
    const confirmBtn = document.getElementById('confirm-btn');
    
    // Считываем уже занятые даты
    const urlParams = new URLSearchParams(window.location.search);
    const bookedDaysRaw = urlParams.get('booked') || ""; 
    let bookedDays = bookedDaysRaw.split(',').filter(d => d !== "");
    
    let selectedDays = [];

    function renderCalendar() {
        // Отрисовка марта 2026 (упрощенно для примера)
        for (let i = 23; i <= 31; i++) createDayElement(i, i > 28 && i < 32 ? false : true); // Хвост февраля
        for (let i = 1; i <= 31; i++) createDayElement(i, false);
    }

    function createDayElement(num, isOther) {
        const div = document.createElement('div');
        div.className = 'day' + (isOther ? ' other-month' : '');
        div.innerText = num;

        const dayStr = num.toString();

        if (!isOther && bookedDays.includes(dayStr)) {
            div.classList.add('booked');
        }

        div.onclick = () => {
            if (isOther) return;
            
            if (selectedDays.includes(dayStr)) {
                // Убираем из выбора
                selectedDays = selectedDays.filter(d => d !== dayStr);
                div.classList.remove('selected');
            } else {
                // Добавляем в выбор
                selectedDays.push(dayStr);
                div.classList.add('selected');
            }
        };
        grid.appendChild(div);
    }

    confirmBtn.onclick = () => {
        if (selectedDays.length === 0) {
            tg.showAlert("No dates selected for uplink.");
            return;
        }
        // Отправляем массив выбранных чисел
        tg.sendData(JSON.stringify({ days: selectedDays }));
        tg.close();
    };

    renderCalendar();
</script>
</body>
</html>
