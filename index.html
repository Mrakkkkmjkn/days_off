<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; max-width: 400px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 5px; padding: 15px 0; text-align: center; cursor: pointer; }
        /* Подсветка того, что УЖЕ в базе */
        .day.booked { border-color: var(--cyan); color: var(--cyan); box-shadow: inset 0 0 5px var(--cyan); }
        /* Подсветка того, что выбираем СЕЙЧАС */
        .day.selected { background: var(--mag) !important; border-color: #fff; transform: scale(1.1); }
        #save { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--bg); border: 2px solid var(--cyan); color: var(--cyan); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <h3 style="color:var(--mag)">МАРТ 2026</h3>
    <div class="grid" id="grid"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Читаем, что уже в базе (из URL)
        const params = new URLSearchParams(window.location.search);
        const booked = (params.get('booked') || "").split(',');

        let selected = [];
        const grid = document.getElementById('grid');

        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day';
            if(booked.includes(i.toString())) d.classList.add('booked');
            d.innerText = i;
            
            d.onclick = () => {
                // Если день уже в базе, его можно выбрать повторно (или просто игнорировать)
                if(selected.includes(i.toString())) {
                    selected = selected.filter(x => x !== i.toString());
                    d.classList.remove('selected');
                } else {
                    selected.push(i.toString());
                    d.classList.add('selected');
                }
            };
            grid.appendChild(d);
        }

        document.getElementById('save').onclick = () => {
            if(selected.length > 0) tg.sendData(JSON.stringify({ days: selected }));
            tg.close();
        };
    </script>
</body>
</html>
