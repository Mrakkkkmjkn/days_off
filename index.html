<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --panel: #16161e;
            --cyan: #00f2ff;
            --magenta: #ff00ff;
        }
        body { 
            background: var(--bg); color: #fff; font-family: sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .header { 
            width: 100%; max-width: 400px; border-bottom: 2px solid var(--cyan);
            margin-bottom: 20px; padding-bottom: 10px; text-align: center;
            font-weight: bold; letter-spacing: 2px; color: var(--magenta);
        }
        .grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; 
            width: 100%; max-width: 400px; 
        }
        .weekday { color: #555; font-size: 12px; text-align: center; text-transform: uppercase; padding-bottom: 5px; }
        .day { 
            background: var(--panel); border: 1px solid #2a2a2e; border-radius: 8px;
            padding: 18px 0; text-align: center; cursor: pointer; transition: 0.2s; font-size: 18px;
        }
        .day.booked { color: var(--cyan); border-color: var(--cyan); box-shadow: inset 0 0 8px rgba(0,242,255,0.2); font-weight: bold; }
        .day.selected { background: var(--magenta) !important; color: white; box-shadow: 0 0 15px var(--magenta); border-color: white; }
        .day.other-month { opacity: 0.1; pointer-events: none; }

        /* Маленькая иконка справа снизу */
        #save-btn { 
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--bg); border: 2px solid var(--cyan);
            color: var(--cyan); font-size: 24px; cursor: pointer;
            box-shadow: 0 0 15px var(--cyan);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; z-index: 100;
        }
        #save-btn:active { transform: scale(0.9); background: var(--cyan); color: #000; }
    </style>
</head>
<body>
    <div class="header">МАРТ 2026</div>
    <div class="grid" id="grid">
        <div class="weekday">пн</div><div class="weekday">вт</div><div class="weekday">ср</div>
        <div class="weekday">чт</div><div class="weekday">пт</div><div class="weekday">сб</div><div class="weekday">вс</div>
    </div>
    
    <button id="save-btn">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const booked = (urlParams.get('booked') || "").split(',').filter(x => x);
        let selected = [];
        const grid = document.getElementById('grid');

        function init() {
            // Февраль (пустые ячейки для выравнивания)
            for(let i=23; i<=28; i++) create(i, true); 
            create(1, true);
            // Март
            for(let i=2; i<=31; i++) create(i, false); 
        }

        function create(num, isOther) {
            const d = document.createElement('div');
            d.className = 'day' + (isOther ? ' other-month' : '');
            d.innerText = num;
            
            // Если день уже есть в БД (пришел через URL)
            if(!isOther && booked.includes(num.toString())) {
                d.classList.add('booked');
            }

            d.onclick = () => {
                if(isOther) return;
                if(selected.includes(num.toString())) {
                    selected = selected.filter(x => x !== num.toString());
                    d.classList.remove('selected');
                } else {
                    selected.push(num.toString());
                    d.classList.add('selected');
                }
            };
            grid.appendChild(d);
        }

        document.getElementById('save-btn').onclick = () => {
            if(selected.length > 0) {
                tg.sendData(JSON.stringify({ days: selected }));
            } else {
                tg.close();
            }
        };

        init();
    </script>
</body>
</html>
