<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .nav { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .nav button { background: none; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 5px; padding: 5px 15px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 15px 0; text-align: center; cursor: pointer; }
        
        /* Состояние: Выходной */
        .day.selected { border-color: var(--mag); box-shadow: 0 0 10px var(--mag); }
        
        /* Состояние: Прошлое (Серое) */
        .day.past { color: #444; background: #0a0a0e; border-color: #1a1a1a; cursor: not-allowed; pointer-events: none; }
        
        #save { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--cyan); border: none; font-size: 24px; }
    </style>
</head>
<body>
    <div class="nav">
        <button onclick="changeMonth(-1)">←</button>
        <h3 id="label">Марта 2026</h3>
        <button onclick="changeMonth(1)">→</button>
    </div>
    <div class="grid" id="grid"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        // Текущая реальная дата для блокировки прошлого
        const now = new Date();
        const realMonth = now.getMonth() + 1;
        const realYear = now.getFullYear();
        const realDay = now.getDate();

        let curMonth = parseInt(params.get('month')) || realMonth;
        let curYear = parseInt(params.get('year')) || realYear;
        let selected = (params.get('booked') || "").split(',').filter(x => x).map(Number);

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            document.getElementById('label').innerText = new Date(curYear, curMonth-1).toLocaleString('ru', {month:'long', year:'numeric'});

            const daysInMonth = new Date(curYear, curMonth, 0).getDate();
            
            for(let i=1; i<=daysInMonth; i++) {
                const d = document.createElement('div');
                d.className = 'day';
                d.innerText = i;

                // СЕРАЯ ЛОГИКА: 
                // 1. Если год меньше текущего
                // 2. Если год текущий, но месяц меньше
                // 3. Если год и месяц текущие, но день меньше сегодняшнего
                const isPast = (curYear < realYear) || 
                               (curYear === realYear && curMonth < realMonth) || 
                               (curYear === realYear && curMonth === realMonth && i < realDay);

                if (isPast) {
                    d.classList.add('past');
                } else {
                    if(selected.includes(i)) d.classList.add('selected');
                    d.onclick = () => {
                        if(selected.includes(i)) {
                            selected = selected.filter(x => x !== i);
                            d.classList.remove('selected');
                        } else {
                            selected.push(i);
                            d.classList.add('selected');
                        }
                    };
                }
                grid.appendChild(d);
            }
        }

        function changeMonth(step) {
            curMonth += step;
            if(curMonth > 12) { curMonth = 1; curYear++; }
            if(curMonth < 1) { curMonth = 12; curYear--; }
            // При переключении месяцев сбрасываем локальный выбор (или запрашиваем у бота)
            // Но в этой версии мы сохраняем то, что выбрали
            render();
        }

        document.getElementById('save').onclick = () => {
            tg.sendData(JSON.stringify({ days: selected, month: curMonth, year: curYear }));
            tg.close();
        };

        render();
    </script>
</body>
</html>
