<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 15px; align-items: center; }
        .nav button { background: #16161e; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 10px; width: 45px; height: 45px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 400px; }
        .weekday { color: #555; font-size: 11px; text-align: center; text-transform: uppercase; padding-bottom: 5px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 14px 0; text-align: center; cursor: pointer; }
        .day.selected { border-color: var(--mag); box-shadow: 0 0 10px var(--mag); background: #25162e; }
        .day.past { color: #333; opacity: 0.4; pointer-events: none; }
        .empty { pointer-events: none; }
        #save { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--cyan); border: none; font-size: 24px; box-shadow: 0 0 15px rgba(0,242,255,0.4); }
    </style>
</head>
<body>
    <div class="nav" style="width: 100%; max-width: 400px;">
        <button onclick="step(-1)">←</button>
        <h3 id="label" style="margin:0; min-width: 150px; text-align: center;"></h3>
        <button onclick="step(1)">→</button>
    </div>
    <div class="grid" id="weekdays"></div>
    <div class="grid" id="grid" style="margin-top: 10px;"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        const i18n = {
            ru: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'] },
            uk: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'] }
        };

        let lang = params.get('lang') || 'ru';
        let curMonth = parseInt(params.get('month'));
        let curYear = parseInt(params.get('year'));
        
        // Главное хранилище: { "03.2026": "10.3.2026,11.3.2026", "04.2026": "" }
        let schedule = JSON.parse(decodeURIComponent(params.get('db') || "{}"));

        function render() {
            const grid = document.getElementById('grid');
            const weekdays = document.getElementById('weekdays');
            grid.innerHTML = ''; weekdays.innerHTML = '';

            // Рисуем шапку дней недели
            i18n[lang].days.forEach(d => {
                const div = document.createElement('div');
                div.className = 'weekday'; div.innerText = d;
                weekdays.appendChild(div);
            });

            const periodKey = `${curMonth.toString().padStart(2, '0')}.${curYear}`;
            document.getElementById('label').innerText = new Date(curYear, curMonth-1).toLocaleString(lang === 'ru' ? 'ru-RU' : 'uk-UA', {month:'long', year:'numeric'}).toUpperCase();

            // Массив выбранных дат для ЭТОГО месяца
            let currentSelected = (schedule[periodKey] || "").split(',').filter(x => x);

            const firstDay = new Date(curYear, curMonth-1, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(curYear, curMonth, 0).getDate();

            for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

            for(let i=1; i<=daysInMonth; i++) {
                const d = document.createElement('div');
                const fullDate = `${i}.${curMonth}.${curYear}`;
                d.className = 'day'; d.innerText = i;

                const isPast = new Date(curYear, curMonth-1, i) < new Date().setHours(0,0,0,0);
                if(isPast) d.classList.add('past');
                else {
                    if(currentSelected.includes(fullDate)) d.classList.add('selected');
                    d.onclick = () => {
                        if(currentSelected.includes(fullDate)) {
                            currentSelected = currentSelected.filter(x => x !== fullDate);
                            d.classList.remove('selected');
                        } else {
                            currentSelected.push(fullDate);
                            d.classList.add('selected');
                        }
                        // Сохраняем изменения сразу в наш объект в памяти
                        schedule[periodKey] = currentSelected.join(',');
                    };
                }
                grid.appendChild(d);
            }
        }

        function step(s) {
            curMonth += s;
            if(curMonth > 12) { curMonth = 1; curYear++; }
            if(curMonth < 1) { curMonth = 12; curYear--; }
            render(); // Просто перерисовываем, данные в schedule сохраняются
        }

        document.getElementById('save').onclick = () => {
            // Отправляем весь объект schedule боту
            tg.sendData(JSON.stringify({ all_data: schedule }));
            tg.close();
        };

        render();
    </script>
</body>
</html>
