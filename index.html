<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h3 { margin-bottom: 20px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 20px; width: 80%; }
        button { background-color: #248bcf; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 80%; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h3>Выберите дату выходного</h3>
    <input type="date" id="datePicker">
    <button id="mainButton">Подтвердить</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        const btn = document.getElementById('mainButton');
        const dateInput = document.getElementById('datePicker');

        // Установим сегодняшнюю дату как минимальную
        dateInput.min = new Date().toISOString().split("T")[0];

        btn.addEventListener('click', () => {
            if (!dateInput.value) {
                alert("Пожалуйста, выберите дату!");
                return;
            }
            const data = { date: dateInput.value };
            tg.sendData(JSON.stringify(data)); 
            tg.close();
        });
    </script>
</body>
</html>
