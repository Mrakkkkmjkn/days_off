<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .lang-btn { background: #16161e; border: 1px solid #333; color: #888; border-radius: 5px; padding: 5px 10px; font-size: 12px; }
        .nav { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 15px; align-items: center; }
        .nav button { background: #16161e; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 8px; width: 40px; height: 40px; cursor: pointer; }
        
        /* Сетка календаря */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 400px; }
        .weekday { color: #888; font-size: 12px; text-align: center; padding-bottom: 5px; font-weight: bold; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 12px 0; text-align: center; cursor: pointer; font-size: 14px; }
        
        .day.selected { border-color: var(--mag); box-shadow: 0 0 10px var(--mag); background: #1f1125; }
        .day.past { color: #444; background: #0a0a0e; border-color: #1a1a1a; pointer-events: none; opacity: 0.5; }
        #save { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--cyan); border: none; font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="label" style="font-weight: bold;"></div>
        <button class="lang-btn" onclick="toggleLang()" id="lang-toggle">RU / UK</button>
    </div>
    <div class="nav">
        <button onclick="changeMonth(-1)">←</button>
        <div class="grid" id="weekday-grid" style="flex-grow: 1; margin: 0 10px; display: grid; grid-template-columns: repeat(7, 1fr);"></div>
        <button onclick="changeMonth(1)">→</button>
    </div>
    <div class="grid" id="grid"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        const i18n = {
            ru: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'] },
            uk: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'] }
        };

        let lang = params.get('lang') === 'uk' ? 'uk' : 'ru';
        const now = new Date();
        let curMonth = parseInt(params.get('month')) || (now.getMonth() + 1);
        let curYear = parseInt(params.get('year')) || now.getFullYear();
        let selected = (params.get('booked') || "").split(',').filter(x => x);

        function toggleLang() {
            lang = lang === 'ru' ? 'uk' : 'ru';
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const weekGrid = document.getElementById('weekday-grid');
            grid.innerHTML = '';
            weekGrid.innerHTML = '';

            // Дни недели
            i18n[lang].days.forEach(d => {
                const div = document.createElement('div');
                div.className = 'weekday';
                div.innerText = d;
                weekGrid.appendChild(div);
            });

            // Название месяца
            const monthName = new Date(curYear, curMonth-1).toLocaleString(lang === 'ru' ? 'ru-RU' : 'uk-UA', {month:'long', year:'numeric'});
            document.getElementById('label').innerText = monthName.toUpperCase();

            // Сетка дней
            const firstDay = new Date(curYear, curMonth-1, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1; // Коррекция для Пн как первого дня
            const daysInMonth = new Date(curYear, curMonth, 0).getDate();

            for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

            for(let i=1; i<=daysInMonth; i++) {
                const d = document.createElement('div');
                const dateId = `${i}.${curMonth}.${curYear}`;
                d.className = 'day';
                d.innerText = i;

                const isPast = new Date(curYear, curMonth-1, i) < new Date(now.getFullYear(), now.getMonth(), now.getDate());

                if (isPast) {
                    d.classList.add('past');
                } else {
                    if(selected.includes(dateId)) d.classList.add('selected');
                    d.onclick = () => {
                        if(selected.includes(dateId)) {
                            selected = selected.filter(x => x !== dateId);
                            d.classList.remove('selected');
                        } else {
                            selected.push(dateId);
                            d.classList.add('selected');
                        }
                    };
                }
                grid.appendChild(d);
            }
        }

        function changeMonth(step) {
            curMonth += step;
            if(curMonth > 12) { curMonth = 1; curYear++; }
            if(curMonth < 1) { curMonth = 12; curYear--; }
            render();
        }

        document.getElementById('save').onclick = () => {
            tg.sendData(JSON.stringify({ days: selected, month: curMonth, year: curYear }));
            tg.close();
        };

        render();
    </script>
</body>
</html>
