<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141417;
            --cyan: #00f2ff;
            --magenta: #ff00ff;
            --green: #00ff41;
            --dark-gray: #2a2a2e;
        }
        body { 
            background: var(--bg); color: var(--cyan); 
            font-family: 'Courier New', monospace; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        .header { 
            width: 100%; max-width: 320px; border-bottom: 1px solid var(--magenta);
            margin-bottom: 20px; padding-bottom: 5px; display: flex; justify-content: space-between;
        }
        .grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; 
            width: 100%; max-width: 320px; 
        }
        .day { 
            background: var(--panel); border: 1px solid var(--dark-gray);
            padding: 12px 0; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .weekday { color: var(--magenta); font-size: 10px; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        .day.booked { color: var(--green); border-color: var(--green); box-shadow: inset 0 0 5px var(--green); }
        .day.selected { background: var(--magenta) !important; color: white; box-shadow: 0 0 15px var(--magenta); }
        .day.other-month { opacity: 0.1; pointer-events: none; }
        
        #confirm-btn { 
            margin-top: 25px; width: 100%; max-width: 320px;
            background: transparent; border: 2px solid var(--cyan);
            color: var(--cyan); padding: 15px; font-weight: bold;
            letter-spacing: 2px; box-shadow: 0 0 10px var(--cyan);
            cursor: pointer;
        }
        #confirm-btn:active { background: var(--cyan); color: black; }
    </style>
</head>
<body>

<div class="header">
    <span>MARCH_2026</span>
    <span style="color:var(--magenta)">STATUS: ONLINE</span>
</div>

<div class="grid" id="grid">
    <div class="weekday">mo</div><div class="weekday">tu</div><div class="weekday">we</div>
    <div class="weekday">th</div><div class="weekday">fr</div><div class="weekday">sa</div><div class="weekday">su</div>
</div>

<button id="confirm-btn">EXECUTE UPLINK</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const urlParams = new URLSearchParams(window.location.search);
    const booked = (urlParams.get('booked') || "").split(',').filter(x => x);
    let selected = [];

    const grid = document.getElementById('grid');
    
    function init() {
        // Хвост февраля (как на скрине)
        for(let i=23; i<=28; i++) create(i, true);
        create(1, true);
        // Март
        for(let i=2; i<=31; i++) create(i, false);
    }

    function create(num, isOther) {
        const d = document.createElement('div');
        d.className = 'day' + (isOther ? ' other-month' : '');
        d.innerText = num;
        
        if(!isOther && booked.includes(num.toString())) d.classList.add('booked');

        d.onclick = () => {
            if(isOther) return;
            if(selected.includes(num.toString())) {
                selected = selected.filter(x => x !== num.toString());
                d.classList.remove('selected');
            } else {
                selected.push(num.toString());
                d.classList.add('selected');
            }
        };
        grid.appendChild(d);
    }

    document.getElementById('confirm-btn').onclick = () => {
        if(selected.length === 0) return tg.close();
        tg.sendData(json_data = JSON.stringify({ days: selected }));
        tg.close();
    };

    init();
</script>
</body>
</html>
