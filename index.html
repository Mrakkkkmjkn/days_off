<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; --gray: #16161e; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 15px; align-items: center; }
        .lang-btn { background: var(--gray); border: 1px solid #333; color: #888; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
        
        .nav { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; align-items: center; }
        .nav button { background: var(--gray); border: 1px solid var(--cyan); color: var(--cyan); border-radius: 12px; width: 45px; height: 45px; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .nav button:active { transform: scale(0.9); background: var(--cyan); color: var(--bg); }
        
        #month-label { font-size: 18px; font-weight: bold; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .weekday { color: #555; font-size: 11px; text-align: center; font-weight: bold; padding-bottom: 8px; }
        .day { background: var(--gray); border: 1px solid #333; border-radius: 10px; padding: 14px 0; text-align: center; cursor: pointer; font-size: 16px; position: relative; transition: 0.2s; }
        
        .day.selected { border-color: var(--mag); box-shadow: 0 0 12px var(--mag); background: #25162e; color: #fff; }
        .day.past { color: #333; opacity: 0.4; pointer-events: none; border-color: transparent; }
        .empty { pointer-events: none; }

        #save { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; border-radius: 50%; background: var(--cyan); border: none; font-size: 30px; color: var(--bg); box-shadow: 0 0 20px rgba(0,242,255,0.4); cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h3 id="month-label">Март 2026</h3>
        <button class="lang-btn" onclick="toggleLang()">RU / UK</button>
    </div>

    <div class="nav">
        <button onclick="step(-1)">←</button>
        <div id="wd-row" style="display: grid; grid-template-columns: repeat(7, 1fr); flex-grow: 1; margin: 0 10px;"></div>
        <button onclick="step(1)">→</button>
    </div>

    <div class="grid" id="grid"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        // Извлекаем данные из hash (#db=...)
        let dbRaw = "";
        if (window.location.hash.includes('db=')) {
            dbRaw = window.location.hash.split('db=')[1];
        }

        let schedule = {};
        try {
            schedule = JSON.parse(decodeURIComponent(dbRaw || "{}"));
        } catch (e) { console.error("Data error", e); }

        const i18n = {
            ru: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'] },
            uk: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'] }
        };

        let lang = params.get('lang') || 'ru';
        let curMonth = parseInt(params.get('month'));
        let curYear = parseInt(params.get('year'));

        function toggleLang() {
            lang = (lang === 'ru') ? 'uk' : 'ru';
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const wdRow = document.getElementById('wd-row');
            grid.innerHTML = ''; wdRow.innerHTML = '';

            // Дни недели
            i18n[lang].days.forEach(d => {
                const div = document.createElement('div');
                div.className = 'weekday'; div.innerText = d;
                wdRow.appendChild(div);
            });

            const periodKey = `${curMonth.toString().padStart(2, '0')}.${curYear}`;
            const dateObj = new Date(curYear, curMonth - 1);
            document.getElementById('month-label').innerText = dateObj.toLocaleString(lang === 'ru' ? 'ru-RU' : 'uk-UA', {month:'long', year:'numeric'});

            let currentSelected = (schedule[periodKey] || "").split(',').filter(x => x);

            const firstDay = new Date(curYear, curMonth - 1, 1).getDay();
            const offset = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(curYear, curMonth, 0).getDate();

            for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

            for(let i=1; i<=daysInMonth; i++) {
                const d = document.createElement('div');
                const fullDate = `${i}.${curMonth}.${curYear}`;
                d.className = 'day'; d.innerText = i;

                const isPast = new Date(curYear, curMonth-1, i) < new Date().setHours(0,0,0,0);
                if(isPast) {
                    d.classList.add('past');
                } else {
                    if(currentSelected.includes(fullDate)) d.classList.add('selected');
                    d.onclick = () => {
                        if(currentSelected.includes(fullDate)) {
                            currentSelected = currentSelected.filter(x => x !== fullDate);
                            d.classList.remove('selected');
                        } else {
                            currentSelected.push(fullDate);
                            d.classList.add('selected');
                        }
                        schedule[periodKey] = currentSelected.join(',');
                    };
                }
                grid.appendChild(d);
            }
        }

        function step(s) {
            curMonth += s;
            if(curMonth > 12) { curMonth = 1; curYear++; }
            if(curMonth < 1) { curMonth = 12; curYear--; }
            render();
        }

        document.getElementById('save').onclick = () => {
            tg.sendData(JSON.stringify({ all_data: schedule }));
            tg.close();
        };

        tg.expand();
        render();
    </script>
</body>
</html>
