<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 18px 0; text-align: center; cursor: pointer; }
        /* Дни из базы */
        .day.booked { border-color: var(--cyan); color: var(--cyan); opacity: 0.6; cursor: default; }
        /* Новые выбранные дни */
        .day.selected { background: var(--mag) !important; box-shadow: 0 0 15px var(--mag); border-color: #fff; }
        #save-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--bg); border: 2px solid var(--cyan); color: var(--cyan); font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="color:var(--mag)">МАРТ 2026</h2>
    <div class="grid" id="grid"></div>
    <button id="save-btn">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const booked = (urlParams.get('booked') || "").split(',');

        let selected = [];
        const grid = document.getElementById('grid');

        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day';
            if(booked.includes(i.toString())) d.classList.add('booked');
            d.innerText = i;
            
            d.onclick = () => {
                if(d.classList.contains('booked')) return; // Уже в базе — не трогаем
                if(selected.includes(i.toString())) {
                    selected = selected.filter(x => x !== i.toString());
                    d.classList.remove('selected');
                } else {
                    selected.push(i.toString());
                    d.classList.add('selected');
                }
            };
            grid.appendChild(d);
        }

        document.getElementById('save-btn').onclick = () => {
            if(selected.length > 0) tg.sendData(JSON.stringify({ days: selected }));
            else tg.close();
        };
    </script>
</body>
</html>
