<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d12; --cyan: #00f2ff; --mag: #ff00ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; align-items: center; }
        .nav { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .nav button { background: #16161e; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 8px; width: 45px; height: 45px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 400px; }
        .weekday { color: #555; font-size: 11px; text-align: center; text-transform: uppercase; padding-bottom: 5px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 12px 0; text-align: center; cursor: pointer; }
        .day.selected { border-color: var(--mag); box-shadow: 0 0 10px var(--mag); background: #25162e; }
        .day.past { color: #333; background: #0a0a0e; border-color: #1a1a1a; pointer-events: none; }
        #save { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--cyan); border: none; font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h3 id="label" style="margin:0"></h3>
        <div id="lang-label" style="font-size: 12px; color: var(--cyan);"></div>
    </div>
    <div class="nav">
        <button onclick="moveMonth(-1)">←</button>
        <div id="days-header" style="display: grid; grid-template-columns: repeat(7, 1fr); flex-grow:1; margin: 0 10px;"></div>
        <button onclick="moveMonth(1)">→</button>
    </div>
    <div class="grid" id="grid"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        const i18n = {
            ru: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'] },
            uk: { days: ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'] }
        };

        let lang = params.get('lang') === 'uk' ? 'uk' : 'ru';
        const now = new Date();
        let curMonth = parseInt(params.get('month'));
        let curYear = parseInt(params.get('year'));
        let selected = (params.get('booked') || "").split(',').filter(x => x);

        function render() {
            const grid = document.getElementById('grid');
            const header = document.getElementById('days-header');
            grid.innerHTML = ''; header.innerHTML = '';

            i18n[lang].days.forEach(d => {
                const el = document.createElement('div');
                el.className = 'weekday'; el.innerText = d;
                header.appendChild(el);
            });

            const monthStr = new Date(curYear, curMonth - 1).toLocaleString(lang === 'ru' ? 'ru-RU' : 'uk-UA', {month:'long', year:'numeric'});
            document.getElementById('label').innerText = monthStr.toUpperCase();

            const firstDay = new Date(curYear, curMonth - 1, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const totalDays = new Date(curYear, curMonth, 0).getDate();

            for(let i=0; i<shift; i++) grid.appendChild(document.createElement('div'));

            for(let i=1; i<=totalDays; i++) {
                const d = document.createElement('div');
                const dId = `${i}.${curMonth}.${curYear}`;
                d.className = 'day'; d.innerText = i;

                const isPast = new Date(curYear, curMonth-1, i) < new Date(now.getFullYear(), now.getMonth(), now.getDate());
                if(isPast) d.classList.add('past');
                else {
                    if(selected.includes(dId)) d.classList.add('selected');
                    d.onclick = () => {
                        if(selected.includes(dId)) {
                            selected = selected.filter(x => x !== dId);
                            d.classList.remove('selected');
                        } else {
                            selected.push(dId);
                            d.classList.add('selected');
                        }
                    };
                }
                grid.appendChild(d);
            }
        }

        function moveMonth(step) {
            let nextM = curMonth + step;
            let nextY = curYear;
            if(nextM > 12) { nextM = 1; nextY++; }
            if(nextM < 1) { nextM = 12; nextY--; }

            // ПЕРЕД ПЕРЕХОДОМ: отправляем текущий месяц боту для сохранения
            // и передаем информацию о том, какой месяц открыть следующим
            tg.sendData(JSON.stringify({ 
                action: 'shift',
                days: selected.filter(d => d.split('.')[1] == curMonth), 
                month: curMonth, 
                year: curYear,
                new_m: nextM,
                new_y: nextY
            }));
            tg.close();
        }

        document.getElementById('save').onclick = () => {
            tg.sendData(JSON.stringify({ 
                action: 'save',
                days: selected.filter(d => d.split('.')[1] == curMonth), 
                month: curMonth, 
                year: curYear 
            }));
            tg.close();
        };

        render();
    </script>
</body>
</html>
