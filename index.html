<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0d12; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 20px 0; text-align: center; cursor: pointer; }
        .day.booked { border-color: #00f2ff; color: #00f2ff; } /* Дни из базы */
        .day.selected { background: #ff00ff !important; border-color: #fff; } /* Новые */
        #save { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: #0d0d12; border: 2px solid #00f2ff; color: #00f2ff; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid" id="grid"></div>
    <button id="save">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Получаем то, что уже в базе
        const params = new URLSearchParams(window.location.search);
        const booked = (params.get('booked') || "").split(',').filter(x => x);

        let selected = [];
        const grid = document.getElementById('grid');

        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day' + (booked.includes(i.toString()) ? ' booked' : '');
            d.innerText = i;
            d.onclick = () => {
                if(selected.includes(i.toString())) {
                    selected = selected.filter(x => x !== i.toString());
                    d.classList.remove('selected');
                } else {
                    selected.push(i.toString());
                    d.classList.add('selected');
                }
            };
            grid.appendChild(d);
        }

        document.getElementById('save').onclick = () => {
            if(selected.length > 0) {
                tg.sendData(JSON.stringify({ days: selected }));
            }
            tg.close();
        };
    </script>
</body>
</html>
