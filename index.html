<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0d12; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 95vw; margin-top: 20px; }
        .day { background: #16161e; border: 1px solid #333; border-radius: 8px; padding: 15px 0; cursor: pointer; }
        /* Дни, которые уже в БД (Синие) */
        .day.booked { border-color: #00f2ff; color: #00f2ff; box-shadow: inset 0 0 10px #00f2ff33; }
        /* Дни, которые выбираем сейчас (Розовые) */
        .day.selected { background: #ff00ff !important; border-color: #fff; }
        #btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #00f2ff; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>МАРТ 2026</h3>
    <div class="grid" id="grid"></div>
    <button id="btn">✓</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Читаем список "занятых" дней из ссылки бота
        const params = new URLSearchParams(window.location.search);
        const booked = (params.get('booked') || "").split(',').filter(x => x);

        let selected = [];
        const grid = document.getElementById('grid');

        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day';
            const dayStr = i.toString();
            
            // Если день есть в списке из БД — красим сразу
            if(booked.includes(dayStr)) d.classList.add('booked');
            
            d.innerText = i;
            d.onclick = () => {
                // Если день уже в базе, можем просто игнорировать или разрешить перевыбор
                if(selected.includes(dayStr)) {
                    selected = selected.filter(x => x !== dayStr);
                    d.classList.remove('selected');
                } else {
                    selected.push(dayStr);
                    d.classList.add('selected');
                }
            };
            grid.appendChild(d);
        }

        document.getElementById('btn').onclick = () => {
            if(selected.length > 0) tg.sendData(JSON.stringify({ days: selected }));
            tg.close();
        };
    </script>
</body>
</html>
